kind = "web"
previewPath = "/"
title = "Brainstorm App"
version = "1.0.0"
id = "artifacts/brainstorm"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24634

[services.development]
run = "FLASK_ENV=development python /home/runner/workspace/artifacts/brainstorm/app.py"

[services.production.run]
args = ["python", "artifacts/brainstorm/app.py"]

[services.production.run.env]
PORT = "24634"

[services.env]
PORT = "24634"
