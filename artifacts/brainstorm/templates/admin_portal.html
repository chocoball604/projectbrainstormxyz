<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .portal-card {
            background: #fff;
            border-radius: 12px;
            padding: 36px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .portal-card h2 {
            font-size: 18px;
            color: #1a1a2e;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-submit:hover { background: #2a2a4e; }
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="portal-card">
        {% if is_admin %}
            <h2>Admin Portal</h2>
            <p style="font-size: 13px; color: #555; margin-bottom: 16px; text-align: center;">
                You are signed in as admin. Pick a tool below.
            </p>
            <ul style="list-style: none; padding: 0; margin: 0 0 18px;">
                <li style="margin-bottom: 10px;">
                    <a href="/admin/step1-library?token={{ token }}"
                       style="display: block; padding: 10px 12px; background: #f5f7fb;
                              color: #1a1a2e; border: 1px solid #d9def0; border-radius: 6px;
                              text-decoration: none; font-size: 14px;">
                        Step 1 Pattern Library editor
                    </a>
                </li>
                <li style="margin-bottom: 10px;">
                    <a href="/admin/step1-telemetry?token={{ token }}"
                       style="display: block; padding: 10px 12px; background: #f5f7fb;
                              color: #1a1a2e; border: 1px solid #d9def0; border-radius: 6px;
                              text-decoration: none; font-size: 14px;">
                        Step 1 Telemetry dashboard
                    </a>
                </li>
                <li style="margin-bottom: 10px;">
                    <a href="/?token={{ token }}"
                       style="display: block; padding: 10px 12px; background: #fff;
                              color: #1a1a2e; border: 1px solid #d9def0; border-radius: 6px;
                              text-decoration: none; font-size: 14px;">
                        Open the app
                    </a>
                </li>
            </ul>
            <form action="/logout" method="POST">{{ csrf_input() }}
                <button type="submit" class="btn-submit"
                        style="background: #fff; color: #1a1a2e; border: 1px solid #1a1a2e;">
                    Sign out
                </button>
            </form>
        {% else %}
            <h2>Portal Login</h2>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form action="/admin-login" method="POST">{{ csrf_input() }}
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" name="admin_password" required autofocus>
                </div>
                <button type="submit" class="btn-submit">Login</button>
            </form>
        {% endif %}
    </div>
</body>
</html>
